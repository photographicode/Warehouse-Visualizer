<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LBD Inventory App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(31, 41, 55, 0.5); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(75, 85, 99, 0.8); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(107, 114, 128, 1); }

        @keyframes fadeInSlideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in-view { animation: fadeInSlideUp 0.3s ease-out forwards; }
        
        .loader { border: 4px solid rgba(59, 130, 246, 0.3); border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes loadProgress { 0% { width: 0%; } 15% { width: 20%; } 50% { width: 65%; } 80% { width: 90%; } 100% { width: 100%; } }

        .app-container { height: 100vh; overflow-y: auto; overflow-x: hidden; }
        .mobile-nav-spacer { height: 80px; }
    </style>
</head>
<body class="bg-[#121212] text-[#e0e0e0] font-sans selection:bg-blue-500/30 overflow-hidden">

    <div id="welcomeScreen" class="fixed inset-0 z-[300] bg-[#121212] flex flex-col items-center justify-center font-sans transition-opacity duration-500">
        <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 20px 20px;"></div>
        <div class="z-10 flex flex-col items-center animate-in fade-in slide-in-from-bottom-8 duration-1000 px-4 text-center">
            <div class="w-20 h-20 sm:w-24 sm:h-24 bg-blue-600/20 border-2 border-blue-500 rounded-2xl flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(37,99,235,0.3)] animate-pulse">
                <i data-lucide="map" class="w-10 h-10 sm:w-12 sm:h-12 text-blue-400"></i>
            </div>
            <h1 class="text-3xl sm:text-5xl font-black text-white tracking-widest mb-2 drop-shadow-lg">LBD INVENTORY</h1>
            <p class="text-blue-400 font-mono text-xs sm:text-sm tracking-widest mb-16">WAREHOUSE VISUALIZER</p>
            <div class="flex flex-col items-center gap-3 w-full max-w-[250px]">
                <div class="w-full h-1.5 bg-gray-800 rounded-full overflow-hidden border border-gray-700 shadow-inner">
                    <div class="h-full bg-blue-500 rounded-full shadow-[0_0_10px_rgba(59,130,246,0.8)]" style="animation: loadProgress 5s cubic-bezier(0.4, 0, 0.2, 1) forwards;"></div>
                </div>
                <span id="welcomeText" class="text-gray-500 text-[10px] sm:text-xs font-mono uppercase tracking-widest animate-pulse mt-2">Connecting to Database API...</span>
            </div>
        </div>
    </div>

    <div id="app" class="app-container opacity-0 transition-opacity duration-500" style="display: none;">
        <div class="min-h-screen flex flex-col items-center justify-center">
            <div class="loader mb-4"></div>
            <h2 class="text-xl font-bold text-gray-300 tracking-wider">SYNCING...</h2>
        </div>
    </div>

    <div id="mobileNav" class="md:hidden fixed bottom-0 w-full bg-[#1a1a1a]/95 backdrop-blur-md border-t border-gray-800 flex justify-around items-center pt-3 pb-safe px-2 z-[100] opacity-0 transition-opacity duration-500" style="display: none;">
        <button onclick="goHome()" class="flex flex-col items-center justify-center w-24 gap-1 group transition-colors">
            <i data-lucide="home" id="nav-icon-home" class="w-6 h-6 text-blue-400 transition-colors"></i>
            <span id="nav-text-home" class="text-[10px] font-bold text-blue-400">Home</span>
        </button>

        <button onclick="forceSync()" class="flex flex-col items-center justify-center w-24 gap-1 group transition-colors">
            <i data-lucide="refresh-cw" class="w-6 h-6 text-gray-400 group-active:text-blue-400 transition-colors"></i>
            <span class="text-[10px] font-bold text-gray-400 group-active:text-blue-400">Sync</span>
        </button>
    </div>

    <script>
        // ==============================================================================
        // CONFIGURATION
        // ==============================================================================
        const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzc7XBAeHw7aGYxo63uV_7FXfG-FakfjhpKcFP965K4hXt_BLANw_YZKxCQVKi-hYw3yA/exec';
        // ==============================================================================

        let warehouseData = null;
        let path = [];
        let highlightedItemId = null;
        let pendingEdits = {}; 

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            fetchAndBuildData();
            setTimeout(() => { 
                const wt = document.getElementById('welcomeText');
                if(wt) wt.innerText = "Building Visualizer..."; 
            }, 3000);
            setTimeout(() => {
                const ws = document.getElementById('welcomeScreen');
                const app = document.getElementById('app');
                const nav = document.getElementById('mobileNav');
                if(ws) {
                    ws.style.opacity = '0';
                    setTimeout(() => { 
                        ws.remove(); 
                        app.style.display = 'block'; 
                        nav.style.display = 'flex';
                        setTimeout(() => { app.style.opacity = '1'; nav.style.opacity = '1'; }, 50); 
                    }, 500);
                }
            }, 5000);
        });

        // --- Custom UI Utilities ---
        window.showToast = (msg, isSuccess = true) => {
            const toast = document.createElement('div');
            toast.className = 'fixed top-20 left-1/2 -translate-x-1/2 md:top-auto md:bottom-6 md:right-6 md:left-auto md:translate-x-0 bg-gray-800 border border-gray-600 text-white px-5 py-3 rounded-lg shadow-2xl z-[250] flex items-center gap-3 animate-in-view text-sm w-max max-w-[90vw]';
            const iconColor = isSuccess ? 'text-green-400' : 'text-blue-400';
            const iconType = isSuccess ? 'check-circle' : 'info';
            toast.innerHTML = `<i data-lucide="${iconType}" class="w-5 h-5 ${iconColor} shrink-0"></i> <span class="font-bold tracking-wide truncate">${msg}</span>`;
            document.body.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
        };

        window.showModal = (title, message, isProcessing = false) => {
            const existing = document.getElementById('system-modal');
            if (existing) existing.remove();
            const modal = document.createElement('div');
            modal.id = 'system-modal';
            modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-[300] p-4 backdrop-blur-sm fade-in';
            let content = isProcessing 
                ? `<div class="bg-gray-900 border border-gray-700 rounded-xl p-8 sm:p-10 max-w-md w-full shadow-2xl flex flex-col items-center text-center"><div class="loader mb-6"></div><h3 class="text-xl sm:text-2xl font-black text-white mb-2 tracking-wide">${title}</h3><p class="text-gray-400 text-xs sm:text-sm leading-relaxed">${message}</p></div>`
                : `<div class="bg-gray-900 border border-gray-700 rounded-xl p-6 sm:p-8 max-w-md w-full shadow-2xl animate-in-view text-center"><div class="w-16 h-16 sm:w-20 sm:h-20 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-500/20"><i data-lucide="info" class="w-8 h-8 sm:w-10 sm:h-10 text-blue-400"></i></div><h3 class="text-xl sm:text-2xl font-black text-white mb-3 tracking-wide">${title}</h3><p class="text-gray-400 text-xs sm:text-sm mb-8 leading-relaxed">${message}</p><button onclick="this.parentElement.parentElement.remove()" class="w-full py-3 sm:py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition-colors shadow-lg shadow-blue-900/20">Acknowledge</button></div>`;
            modal.innerHTML = content;
            document.body.appendChild(modal);
            lucide.createIcons();
        };

        async function fetchAndBuildData(forceRefetch = false) {
            try {
                const currentPathIds = path.map(p => p.id);
                
                let url = GOOGLE_APPS_SCRIPT_URL + '?action=read';
                if (forceRefetch) url += '&t=' + new Date().getTime();

                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to connect to Google API');
                
                const result = await response.json();
                if (result.status === 'error') throw new Error(result.message);

                let rawData = result.data;
                if (!rawData || rawData.length < 2) throw new Error("No data found in the spreadsheet.");

                const headers = rawData[0].map(h => String(h).replace(/^\uFEFF/, '').trim().toLowerCase());
                const rows = rawData.slice(1).filter(r => r.length > 0 && r[0] !== undefined && String(r[0]).trim() !== '');

                const racksMap = {};
                for (let r = 1; r <= 3; r++) {
                    const rackId = `Rack ${r}`;
                    racksMap[rackId] = { id: `rack-0${r}`, name: `Rack 0${r}`, type: 'rack', description: `Main storage rack ${r}`, children: [] };
                    for (let s = 1; s <= 7; s++) {
                        racksMap[rackId].children.push({ id: `sec-${r}-${s}`, name: `Section ${s.toString().padStart(2, '0')}`, type: 'section', children: [], _tempContainers: {} });
                    }
                }
                
                racksMap['Outside'] = {
                    id: 'zone-outside', name: 'Outside Zone', type: 'rack', description: 'All items placed outside.', children: [
                        { id: 'sec-out-1', name: 'Main Outside Area', type: 'section', children: [], _tempContainers: {} }
                    ]
                };

                rows.forEach((row, rowIndex) => {
                    const getCol = (name) => { const idx = headers.indexOf(name.toLowerCase()); return idx >= 0 ? String(row[idx] || '').trim() : ''; };
                    
                    const rackName = getCol('Rack');
                    let caseId = getCol('Case ID') || getCol('Box ID');
                    let itemCode = getCol('Item Code');
                    let itemName = getCol('Item Name') || getCol('Case Name');
                    let secNum = getCol('Section');
                    let partStr = getCol('Part'); 
                    let containerNum = getCol('Container');
                    const itemDesc = getCol('Description');
                    const itemNotes = getCol('Notes');
                    const status = getCol('Status') || 'Ready for Shipping';

                    // --- COLUMN SHIFT AUTO-CORRECTION ---
                    // If the legacy backend placed the Box ID in the Item Code column, 
                    // this logic rescues the row so it doesn't disappear.
                    if (!caseId && itemCode && itemCode.match(/^B-\d+$/i)) {
                        caseId = itemCode;
                        itemCode = '';
                        itemName = getCol('Item Name') || getCol('Description');
                        containerNum = getCol('Case Name') || getCol('Container');
                        partStr = getCol('Container') || getCol('Part');
                        secNum = getCol('Part') || getCol('Section');
                    }
                    
                    itemName = itemName || caseId;

                    if (!rackName || !caseId) return; // Skip entirely empty/invalid rows

                    let caseName = itemName;
                    if (/^box\s*[\d\-a-z]+$/i.test(caseName) || caseName.toLowerCase() === 'box nil') caseName = itemName || caseName;
                    if (caseName.toLowerCase().includes('set') || caseName.toLowerCase().includes('kit') || caseName.toLowerCase().includes('mtc')) caseName = caseName.toUpperCase();

                    let targetRackKey = Object.keys(racksMap).find(k => k.toLowerCase() === rackName.toLowerCase());
                    let targetRack = racksMap[targetRackKey];
                    if (!targetRack) {
                        targetRack = { id: `rack-${rackName.replace(/\s+/g, '-').toLowerCase()}`, name: rackName, type: 'rack', description: '', children: [] };
                        racksMap[rackName] = targetRack;
                    }

                    let targetSection = rackName.toLowerCase() === 'outside' 
                        ? targetRack.children[0] 
                        : targetRack.children.find(s => s.name === `Section ${String(secNum).padStart(2, '0')}`);
                    if (!targetSection) {
                        targetSection = { id: `sec-${rackName}-${secNum}`, name: `Section ${String(secNum).padStart(2, '0')}`, type: 'section', children: [], _tempContainers: {} };
                        targetRack.children.push(targetSection);
                    }

                    const isTop = (partStr || '').toLowerCase() === 'top';
                    const containerKey = `${partStr}-${containerNum}`;
                    
                    if (!targetSection._tempContainers[containerKey]) {
                        targetSection._tempContainers[containerKey] = {
                            id: `${targetSection.id}-${isTop?'p':'fc'}${containerNum}`,
                            name: isTop ? `Palette ${containerNum}` : `Flight Case ${containerNum}`,
                            type: isTop ? 'palette' : 'flight-case',
                            description: '',
                            part: isTop ? 'top' : 'bottom',
                            index: parseInt(containerNum, 10) || 0,
                            children: []
                        };
                    }

                    let box = targetSection._tempContainers[containerKey].children.find(b => b.id === caseId);
                    if (!box) {
                        box = { 
                            id: caseId, 
                            name: caseName, 
                            type: 'box', 
                            location: `${rackName}, Section ${String(secNum).padStart(2, '0')}, ${isTop ? 'Palette' : 'Case'} ${containerNum}`,
                            totalQty: 0, 
                            items: [] 
                        };
                        targetSection._tempContainers[containerKey].children.push(box);
                    }

                    box.items.push({ 
                        uniqueId: `item_${rowIndex}_${caseId}`,
                        sheetRow: rowIndex + 2,
                        code: itemCode, 
                        name: itemName, 
                        desc: itemDesc,
                        notes: itemNotes,
                        status: status 
                    });
                    box.totalQty = box.items.length;
                });

                Object.values(racksMap).forEach(rack => {
                    rack.children.forEach(section => {
                        Object.values(section._tempContainers).forEach(container => {
                            if (container.children.length > 0) {
                                if (container.type === 'flight-case') {
                                    if (container.children.length === 1) {
                                        const caseObj = container.children[0];
                                        container.name = caseObj.name; 
                                        container.description = `Flight Case ID: ${caseObj.id}`;
                                    } else {
                                        container.name = 'MIXED FLIGHT CASES';
                                        container.description = `Storage zone containing ${container.children.length} flight cases.`;
                                    }
                                } else {
                                    container.description = 'General Palette Storage';
                                }
                                section.children.push(container);
                            }
                        });
                        delete section._tempContainers; 
                        section.children.sort((a, b) => {
                            if (a.part !== b.part) return a.part === 'top' ? -1 : 1;
                            return a.index - b.index;
                        });
                    });
                });

                warehouseData = { id: 'root', name: 'Main Warehouse Floor', type: 'warehouse', children: Object.values(racksMap) };
                
                path = [warehouseData];
                if (forceRefetch && currentPathIds.length > 1) {
                    for (let i = 1; i < currentPathIds.length; i++) {
                        const targetId = currentPathIds[i];
                        const foundNode = findNodeById(targetId, warehouseData);
                        if (foundNode) path.push(foundNode);
                        else break; 
                    }
                }

                renderApp();
                
                const m = document.getElementById('system-modal');
                if(m && forceRefetch) m.remove();

            } catch (error) {
                console.error("Error fetching data:", error);
                const m = document.getElementById('system-modal');
                if(m) m.remove();

                document.getElementById('app').innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center text-red-400 p-6 text-center">
                        <i data-lucide="alert-triangle" class="w-12 h-12 mb-4"></i>
                        <h2 class="text-xl font-bold">Failed to build inventory</h2>
                        <p class="text-gray-500 mt-2 text-sm max-w-md">Please ensure your Google Apps Script is deployed properly and is accessible to 'Anyone'.</p>
                        <p class="text-gray-600 mt-2 text-[10px] font-mono bg-gray-900 p-4 rounded-lg border border-gray-700 w-full max-w-md break-words">${error.message}</p>
                        <button onclick="forceSync()" class="mt-6 px-6 py-3 bg-gray-800 border border-gray-700 rounded-lg hover:bg-gray-700 text-white font-bold transition-colors shadow-lg active:scale-95">Try Again</button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        window.forceSync = () => {
            pendingEdits = {};
            showModal("Syncing Data...", "Pulling latest inventory directly from Google Sheets.", true);
            fetchAndBuildData(true);
        };

        const findItemGlobal = (uniqueId) => {
            let found = null;
            const traverse = (node) => {
                if (found) return;
                if (node.type === 'box') {
                    const match = node.items.find(i => i.uniqueId === uniqueId);
                    if (match) { found = { ...match, caseId: node.id, location: node.location }; }
                }
                if (node.children) node.children.forEach(traverse);
            };
            traverse(warehouseData);
            return found;
        };

        // --- APPS SCRIPT API CALLER ---
        async function updateGoogleSheet(action, payloadItems) {
            try {
                // Sending without specific headers ensures Apps Script skips CORS preflight checks automatically
                const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: action, items: payloadItems })
                });
                return true; 
            } catch (error) {
                console.error("Failed to write to Google Sheets:", error);
                return false;
            }
        }

        // --- INLINE EDITING LOGIC (OPTIMISTIC UI) ---
        window.handleEdit = (uniqueId, field, value) => {
            if (!pendingEdits[uniqueId]) {
                const item = findItemGlobal(uniqueId);
                pendingEdits[uniqueId] = { uniqueId: uniqueId, sheetRow: item.sheetRow, code: item.code, status: item.status };
            }
            pendingEdits[uniqueId][field] = value;
            
            const desktopBtn = document.getElementById('saveEditsBtnDesktop');
            const mobileBtn = document.getElementById('saveEditsBtnMobile');
            if (desktopBtn) desktopBtn.classList.remove('hidden');
            if (mobileBtn) mobileBtn.classList.remove('hidden');
        };

        window.submitEdits = async () => {
            const updates = Object.values(pendingEdits);
            if(updates.length === 0) return;
            
            updates.forEach(u => {
                const item = findItemGlobal(u.uniqueId);
                if (item) {
                    item.code = u.code;
                    item.status = u.status;
                }
            });

            showModal("Saving Changes...", "Pushing updates directly to Google Sheets...", true);
            await updateGoogleSheet('edit', updates);
            
            pendingEdits = {};
            
            const modal = document.getElementById('system-modal');
            if(modal) modal.remove();
            
            showToast("Edits saved successfully!");
            renderApp(); 
        };

        // --- STRUCTURE CREATION LOGIC ---

        const getNextBoxId = () => {
            let maxId = 0;
            const scan = (node) => {
                if (node.type === 'box') {
                    const match = node.id.match(/^B-(\d+)$/i);
                    if (match) {
                        const num = parseInt(match[1], 10);
                        if (num > maxId) maxId = num;
                    }
                }
                if (node.children) node.children.forEach(scan);
            };
            if(warehouseData) scan(warehouseData);
            return `B-${maxId + 1}`;
        };

        window.addSection = async (rackId) => {
            const rack = findNodeById(rackId);
            if(rack) {
                const nextNum = rack.children.length + 1;
                const secId = `sec-${rack.name.replace(/\s+/g, '-').toLowerCase()}-${nextNum}`;
                
                rack.children.push({
                    id: secId,
                    name: `Section ${nextNum.toString().padStart(2, '0')}`,
                    type: 'section',
                    children: []
                });
                
                showToast(`Section ${nextNum.toString().padStart(2, '0')} added. Pushing to database...`, false);
                renderApp();

                const success = await updateGoogleSheet('add', [{
                    rack: rack.name,
                    section: nextNum.toString(),
                    part: 'Top',
                    container: '1',
                    caseId: 'EMPTY_SLOT',
                    name: 'New Section Placeholder',
                    desc: 'Auto-generated section placeholder',
                    status: 'Ready for Shipping'
                }]);
                if(success) showToast("Section synced to database!");
            }
        };

        window.addPalette = async (sectionId) => {
            const section = findNodeById(sectionId);
            if(section) {
                const topItems = section.children.filter(p => p.part === 'top');
                const nextNum = topItems.length + 1;
                const paletteId = `${section.id}-p${nextNum}`;
                
                section.children.push({
                    id: paletteId,
                    name: `Palette ${nextNum}`,
                    type: 'palette',
                    description: 'Newly added palette',
                    part: 'top',
                    index: nextNum,
                    children: []
                });
                
                section.children.sort((a, b) => {
                    if (a.part !== b.part) return a.part === 'top' ? -1 : 1;
                    return a.index - b.index;
                });
                
                showToast(`Palette ${nextNum} added. Pushing to database...`, false);
                renderApp();

                let rackName = "Unknown";
                warehouseData.children.forEach(r => {
                    if(r.children.some(s => s.id === sectionId)) rackName = r.name;
                });
                let secVal = section.name.replace(/[^0-9]/g, '');

                const success = await updateGoogleSheet('add', [{
                    rack: rackName,
                    section: secVal,
                    part: 'Top',
                    container: nextNum.toString(),
                    caseId: 'EMPTY_SLOT',
                    name: 'New Palette Placeholder',
                    desc: 'Auto-generated palette placeholder',
                    status: 'Ready for Shipping'
                }]);
                if(success) showToast("Palette synced to database!");
            }
        };

        window.showAddBoxModal = (containerId) => {
            const existing = document.getElementById('system-modal');
            if (existing) existing.remove();
            
            const nextBoxId = getNextBoxId();
            
            const modal = document.createElement('div');
            modal.id = 'system-modal';
            modal.className = 'fixed inset-0 bg-black/90 flex items-center justify-center z-[300] p-4 backdrop-blur-sm fade-in';
            modal.innerHTML = `
                <div class="bg-gray-900 border border-gray-700 rounded-xl p-6 sm:p-8 max-w-md w-full shadow-2xl animate-in-view text-center">
                    <div class="w-16 h-16 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-500/20">
                        <i data-lucide="package-plus" class="w-8 h-8 text-blue-400"></i>
                    </div>
                    <h3 class="text-xl font-black text-white mb-2 tracking-wide">Add New Box & Item</h3>
                    <p class="text-xs text-gray-400 mb-6">Enter the new Box ID and the primary Item Name. Changes will sync directly to the database.</p>
                    
                    <div class="text-left mb-3">
                        <label class="block text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Box ID <span class="text-red-500">*</span></label>
                        <input type="text" id="newBoxIdInput" value="${nextBoxId}" class="w-full bg-[#121620] border border-gray-600 focus:border-blue-500 rounded-lg p-2.5 text-sm text-white font-medium outline-none transition-colors shadow-inner uppercase tracking-widest" placeholder="e.g. B-46" />
                    </div>
                    
                    <div class="text-left mb-8">
                        <label class="block text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Item Name <span class="text-red-500">*</span></label>
                        <input type="text" id="newItemNameInput" class="w-full bg-[#121620] border border-gray-600 focus:border-blue-500 rounded-lg p-2.5 text-sm text-white font-medium outline-none transition-colors shadow-inner" placeholder="e.g. Shure SM58 Mic" />
                    </div>

                    <div class="flex gap-3">
                        <button onclick="this.closest('#system-modal').remove()" class="w-1/2 py-3 bg-gray-800 hover:bg-gray-700 text-white font-bold rounded-lg transition-colors border border-gray-600">Cancel</button>
                        <button onclick="confirmAddBox('${containerId}')" class="w-1/2 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition-colors shadow-lg shadow-blue-900/20 flex justify-center items-center gap-2"><i data-lucide="upload-cloud" class="w-4 h-4"></i> Add & Push</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            lucide.createIcons();
            setTimeout(() => document.getElementById('newItemNameInput').focus(), 100);
        };

        window.confirmAddBox = async (containerId) => {
            const boxIdInput = document.getElementById('newBoxIdInput');
            const itemNameInput = document.getElementById('newItemNameInput');
            
            if (!boxIdInput || !itemNameInput) return;
            let newId = boxIdInput.value.trim().toUpperCase();
            let newItemName = itemNameInput.value.trim();
            
            if (!newId || !newItemName) {
                showToast("Please provide both Box ID and Item Name.", false);
                return;
            }

            // Strictly check for duplicates globally
            let exists = false;
            const checkExists = (node) => {
                if (node.type === 'box' && node.id.toUpperCase() === newId) exists = true;
                if (node.children) node.children.forEach(checkExists);
            };
            checkExists(warehouseData);

            if (exists) {
                showModal("Duplicate ID Detected", `The Box ID "<b>${newId}</b>" is already registered in the warehouse. Please use a unique Box ID (e.g., ${getNextBoxId()}).`);
                return;
            }

            let targetContainer = null, targetSection = null, targetRack = null;
            warehouseData.children.forEach(rack => {
                if(targetContainer) return;
                rack.children.forEach(sec => {
                    if(targetContainer) return;
                    sec.children.forEach(cont => {
                        if(cont.id === containerId) {
                            targetContainer = cont; targetSection = sec; targetRack = rack;
                        }
                    });
                });
            });

            if (targetContainer && targetSection && targetRack) {
                // Optimistic Local Update
                const newUniqueId = `item_new_${Date.now()}_${newId}`;
                const newBox = {
                    id: newId,
                    name: newItemName,
                    type: 'box',
                    location: `${targetRack.name}, ${targetSection.name}, ${targetContainer.part === 'top' ? 'Palette' : 'Case'} ${targetContainer.index}`,
                    totalQty: 1,
                    items: [{
                        uniqueId: newUniqueId,
                        sheetRow: -1, 
                        code: '',
                        name: newItemName,
                        desc: 'Added directly via visualizer interface.',
                        notes: '',
                        status: 'Ready for Shipping'
                    }]
                };
                targetContainer.children.push(newBox);
                
                document.getElementById('system-modal').remove();
                showToast(`Pushing Box ${newId} to database...`, false);
                renderApp();

                // Prepare and push to Google Sheets
                let secVal = targetSection.name.replace(/[^0-9]/g, ''); 
                if(!secVal) secVal = targetSection.name; 
                
                const sheetPayload = {
                    rack: targetRack.name,
                    section: secVal,
                    part: targetContainer.part === 'top' ? 'Top' : 'Bottom',
                    container: targetContainer.index.toString(),
                    caseId: newId,
                    name: newItemName,
                    code: '',
                    desc: 'Added directly via visualizer interface.',
                    status: 'Ready for Shipping'
                };

                const success = await updateGoogleSheet('add', [sheetPayload]);
                if (success) {
                    showToast(`Box ${newId} successfully saved to database!`);
                } else {
                    showToast(`Warning: Failed to sync Box ${newId}. Check connection.`, false);
                }
            }
        };

        window.goHome = () => { 
            pendingEdits = {};
            if(path.length === 0) path = [warehouseData]; 
            renderApp(); 
        }

        // --- Icons ---
        const getIconForItemName = (name) => {
            const n = name.toLowerCase();
            if (n.includes('tv') || n.includes('mtc') || n.includes('planar') || n.includes('ks-')) return 'tv';
            if (n.includes('speaker') || n.includes('sbkset') || n.includes('spk')) return 'speaker';
            if (n.includes('mic') || n.includes('superlux') || n.includes('shure')) return 'mic';
            if (n.includes('mix kit') || n.includes('amp kit') || n.includes('switcher')) return 'sliders-horizontal'; 
            if (n.includes('router')) return 'router'; 
            if (n.includes('converter') || n.includes('recorder') || n.includes('capture device') || n.includes('poe')) return 'hard-drive'; 
            if (n.includes('splitter')) return 'git-branch'; 
            if (n.includes('power') || n.includes('pwr')) return 'zap'; 
            if (n.includes('cable') || n.includes('cord') || n.includes('fiber') || n.includes('hdmi') || n.includes('sdi') || n.includes('ext')) return 'cable';
            if (n.includes('adaptor')) return 'plug';
            if (n.includes('video') || n.includes('cam')) return 'video';
            if (n.includes('case')) return 'briefcase';
            if (n.includes('tie') || n.includes('tape')) return 'paperclip'; 
            if (n.includes('tool') || n.includes('screwdriver')) return 'wrench'; 
            if (n.includes('heat gun') || n.includes('tripod')) return 'flame';
            if (n.includes('glasses')) return 'glasses';
            if (n.includes('meter')) return 'ruler';
            if (n.includes('sandbag')) return 'weight';
            if (n.includes('foam')) return 'cloud';
            if (n.includes('empty')) return 'dashed-box'; 
            return 'box'; 
        };

        const searchInventory = (query) => {
            const results = [];
            const q = query.toLowerCase();
            const traverse = (node, currentPath) => {
                if (node.type === 'box') {
                    if (node.name.toLowerCase().includes(q) || node.id.toLowerCase().includes(q)) {
                        results.push({ item: node, path: currentPath });
                    } else {
                        const itemMatch = node.items.find(i => 
                            i.name.toLowerCase().includes(q) || 
                            (i.code && i.code.toLowerCase().includes(q)) ||
                            (i.desc && i.desc.toLowerCase().includes(q)) ||
                            (i.notes && i.notes.toLowerCase().includes(q))
                        );
                        if (itemMatch) results.push({ item: node, path: currentPath, matchedSubItem: itemMatch.name });
                    }
                }
                if (node.children) node.children.forEach(child => traverse(child, [...currentPath, child]));
            };
            traverse(warehouseData, [warehouseData]);
            return results;
        };

        window.handleSearch = (e) => {
            const query = e.value;
            const resDiv = document.getElementById('searchResultsDropdown');
            if (!query || query.length < 2) { resDiv.classList.add('hidden'); return; }
            
            const results = searchInventory(query).slice(0, 15);
            
            if (results.length === 0) {
                resDiv.innerHTML = '<div class="p-4 text-sm text-gray-400 text-center">No items found.</div>';
            } else {
                resDiv.innerHTML = results.map((r) => {
                    let icon = getIconForItemName(r.item.name);
                    return `
                    <div onclick="jumpToSearchResult('${r.item.id}')" class="p-3 border-b border-gray-700 hover:bg-gray-700 cursor-pointer flex justify-between items-center transition-colors">
                        <div class="overflow-hidden pr-2">
                            <div class="font-bold text-blue-400 text-sm flex items-center gap-2 truncate">
                                <i data-lucide="${icon}" class="w-4 h-4 text-amber-500 shrink-0"></i> <span class="truncate">${r.item.name}</span>
                            </div>
                            <div class="text-[10px] text-gray-400 mt-1 truncate">
                                ${r.path.map(p => p.name).join(' > ')}
                                ${r.matchedSubItem ? `<br><span class="text-blue-500 font-bold">Matches: ${r.matchedSubItem}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `}).join('');
                lucide.createIcons();
            }
            resDiv.classList.remove('hidden');
        };

        window.jumpToSearchResult = (itemId) => {
            pendingEdits = {};
            const query = document.getElementById('searchInput');
            if(query) query.value = '';
            
            document.getElementById('searchResultsDropdown').classList.add('hidden');
            
            let targetNode = findNodeById(itemId);
            
            if (targetNode) {
                const buildPath = (node, targetId, currentPath) => {
                    if (node.id === targetId) return currentPath;
                    if (node.children) {
                        for (let child of node.children) {
                            let p = buildPath(child, targetId, [...currentPath, child]);
                            if (p) return p;
                        }
                    }
                    return null;
                };
                
                let foundPath = buildPath(warehouseData, itemId, [warehouseData]);
                if(foundPath) {
                    path = foundPath.slice(0, -1);
                    highlightedItemId = itemId;
                    renderApp();

                    setTimeout(() => {
                        const el = document.getElementById(`box-card-${itemId}`);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 300);
                }
            }
        };

        function findNodeById(id, node = warehouseData) {
            if (node.id === id) return node;
            if (node.children) {
                for (let child of node.children) {
                    const found = findNodeById(id, child);
                    if (found) return found;
                }
            }
            return null;
        }

        window.navigateTo = (id) => { pendingEdits = {}; highlightedItemId = null; const node = findNodeById(id); if (node) { path.push(node); renderApp(); } };
        window.navigateBack = (index) => { pendingEdits = {}; highlightedItemId = null; path = path.slice(0, index + 1); renderApp(); };
        window.goUp = () => { pendingEdits = {}; highlightedItemId = null; if (path.length > 1) { path = path.slice(0, -1); renderApp(); } };

        // --- Render Components ---
        const renderWarehouse = (node) => {

                            <div class="absolute inset-0 opacity-10 pointer-events-none hidden md:block" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 20px 20px;"></div>`;

        const renderRack = (node) => {

                                        <div class="w-full h-full flex flex-wrap gap-[1px] content-end justify-center opacity-80">
                                            ${item.children.slice(0, 6).map(() => `<div class="w-1.5 h-1.5 md:w-3 md:h-3 bg-amber-200/80 rounded-sm"></div>`).join('')}
                                        </div>
                                     </div>`;
                        } else {
                            const wClass = items.length === 1 ? 'w-[90%]' : 'w-1/3';
                            html += `<div class="${wClass} h-3/4 bg-gradient-to-b from-[#2d3748] to-[#1a202c] rounded-sm border md:border-2 border-gray-400/80 flex items-center justify-center shadow-lg group-hover:from-[#4a5568] transition-colors p-1 relative mx-auto overflow-hidden" title="${item.name}">
                                        <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 4px 4px;"></div>
                                        <span class="text-[5px] md:text-[8px] font-black text-white text-center uppercase leading-tight z-10 drop-shadow-[0_1px_2px_rgba(0,0,0,1)] line-clamp-2 leading-none">${item.name}</span>
                                     </div>`;
                        }
                    });
                    html += `</div>`;
                });
                html += `</div>`;
            });
            
            // Add New Section Button
            html += `<div onclick="addSection('${node.id}')" class="flex-1 min-w-[80px] md:min-w-[100px] h-[85%] md:h-[90%] border-x-2 md:border-x-4 border-dashed border-gray-600 flex flex-col justify-center items-center bg-gray-900/30 cursor-pointer hover:bg-gray-800/80 transition-colors relative group mt-auto active:bg-gray-800 rounded-lg mx-1 opacity-60 hover:opacity-100">
                        <i data-lucide="plus-circle" class="w-6 h-6 md:w-8 md:h-8 text-gray-500 group-hover:text-blue-400 mb-2 transition-colors"></i>
                        <span class="text-[9px] md:text-xs text-gray-500 group-hover:text-blue-300 font-bold uppercase tracking-wider text-center transition-colors">Add<br>Section</span>
                    </div>`;
                    
            html += `</div>`; return html;
        };

        const renderPaletteCard = (item) => {
            return `
                <div onclick="navigateTo('${item.id}')" class="bg-gray-800 rounded-lg border border-gray-700 p-4 cursor-pointer md:hover:border-amber-500 md:hover:bg-gray-750 transition-all shadow-lg active:scale-[0.98] flex flex-col">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-base md:text-lg font-bold text-amber-500 flex items-center"><i data-lucide="grid-3x3" class="w-4 h-4 mr-2 shrink-0"></i> <span class="truncate">${item.name}</span></h3>
                        <span class="bg-gray-900 px-2 py-1 rounded text-[10px] md:text-xs text-gray-400 font-mono shrink-0 ml-2">${item.children.length} Cases</span>

                        <div class="w-[80%] flex flex-wrap gap-1 justify-center items-end z-10 mb-1">
                            ${item.children.slice(0,10).map((_, i) => `<div class="w-4 h-4 md:w-6 md:h-6 bg-amber-200 border border-amber-400 rounded-sm shadow-sm md:group-hover:-translate-y-1 transition-transform" style="transition-delay: ${i * 30}ms"></div>`).join('')}
                        </div>
                        <div class="w-[90%] h-2 md:h-3 bg-amber-800 rounded-sm shadow-md border-b-2 border-amber-950 flex justify-evenly items-center">
                            <div class="w-1 h-1.5 md:h-2 bg-amber-950 rounded-sm"></div><div class="w-1 h-1.5 md:h-2 bg-amber-950 rounded-sm"></div><div class="w-1 h-1.5 md:h-2 bg-amber-950 rounded-sm"></div>

                    </div>
                    <p class="text-[10px] md:text-xs text-gray-500 mt-auto line-clamp-2">${item.description}</p>
                </div>

        const renderSection = (node) => {
            const topItems = node.children.filter(p => p.part === 'top');
            const bottomItems = node.children.filter(p => p.part === 'bottom');
            return `
                <div class="w-full h-auto min-h-[500px] md:h-[600px] bg-gray-900 rounded-lg p-3 sm:p-6 flex flex-col gap-6 sm:gap-8 overflow-y-auto border-2 md:border-4 border-gray-700">
                    <div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 md:gap-4">
                            ${topItems.map(renderPaletteCard).join('')}
                            
                            <div onclick="addPalette('${node.id}')" class="bg-gray-800/50 border-2 border-dashed border-gray-600 rounded-lg p-4 cursor-pointer hover:border-blue-500 hover:bg-gray-800 transition-all shadow-sm flex flex-col items-center justify-center min-h-[150px] opacity-60 hover:opacity-100 group">
                                <i data-lucide="plus-circle" class="w-6 h-6 md:w-8 md:h-8 text-gray-500 group-hover:text-blue-400 mb-2 transition-colors"></i>

                    ${bottomItems.length > 0 ? `

                        <h4 class="text-gray-400 font-bold mb-3 md:mb-4 flex items-center gap-2 border-b border-gray-800 pb-2 text-xs md:text-base"><i data-lucide="arrow-down" class="w-4 h-4"></i> Bottom Part (Floor Level)</h4>
                        <div class="flex flex-col gap-3 md:gap-4">${bottomItems.map(renderBigGroupCard).join('')}</div>
                    </div>` : ''}
                </div>
            `;
        };

        const renderContainer = (node) => {
            const isFlightCase = node.type === 'flight-case';
            const bgTheme = isFlightCase ? 'bg-gray-800' : 'bg-amber-900/10';
            const borderTheme = isFlightCase ? 'border-gray-600' : 'border-amber-900/30';
            const textTheme = isFlightCase ? 'text-gray-300' : 'text-amber-500';
            const iconType = isFlightCase ? 'briefcase' : 'package';
            const badgeBg = isFlightCase ? 'bg-gray-900/80 border-gray-700' : 'bg-amber-950/50 border-amber-900/50';

            let html = `
                <div class="w-full h-auto min-h-[500px] md:h-[600px] ${bgTheme} rounded-lg p-3 sm:p-8 border ${borderTheme} overflow-y-auto shadow-inner">

                            <i data-lucide="${iconType}" class="w-8 h-8 md:w-8 md:h-8 shrink-0"></i>

                            <span class="hidden md:inline">Total Items: ${node.children.length}</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-6">
            `;

            node.children.forEach(box => {

                let barcodeHtml = ''; for(let i=0; i<14; i++) { barcodeHtml += `<div class="h-full bg-black" style="width: ${Math.random() > 0.5 ? '1px' : '3px'}"></div>`; }

                const isHighlighted = box.id === highlightedItemId;

                let boxBgClass, boxTextClass, boxIconColor, qtyBgClass, highlightColor;

                if (isItemCase) {
                    boxBgClass = isHighlighted ? 'bg-gradient-to-br from-[#1e3a5f] to-[#0f172a] border-[#60a5fa] ring-4 ring-blue-400 shadow-[0_0_20px_rgba(59,130,246,0.8)] scale-105 z-10' 
                                               : 'bg-gradient-to-br from-[#2a2d35] to-[#16181d] border-transparent md:hover:border-gray-400 md:hover:-translate-y-1 shadow-lg';
                    boxTextClass = isHighlighted ? 'text-blue-200' : 'text-gray-200';
                    boxIconColor = isHighlighted ? 'text-blue-400' : 'text-gray-400';
                    qtyBgClass = isHighlighted ? 'bg-blue-500/30' : 'bg-[#000]/40 border border-gray-600';
                    highlightColor = 'blue';
                } else {
                    boxBgClass = isHighlighted ? 'bg-yellow-300 border-yellow-600 ring-4 ring-yellow-400 shadow-[0_0_20px_rgba(250,204,21,0.6)] scale-105 z-10' 
                                               : 'bg-[#d9b382] border-[#a68050] md:hover:-translate-y-1 shadow-lg';
                    boxTextClass = isHighlighted ? 'text-yellow-900' : 'text-[#5c3e19]';
                    boxIconColor = isHighlighted ? 'text-yellow-700' : 'text-[#8c6535]';
                    qtyBgClass = isHighlighted ? 'bg-yellow-500/30' : 'bg-[#8c6535]/20';
                    highlightColor = 'yellow';
                }
                
                let boxDisplayName = box.id;
                if (box.id.startsWith('B-')) boxDisplayName = 'Box ' + box.id.substring(2);
                else if (box.id.match(/-b\d+$/)) boxDisplayName = 'Box ' + box.id.split('-b').pop();

                let customIcon = getIconForItemName(box.name);
                
                let caseAccents = isItemCase ? `
                    <div class="absolute inset-0 border-[2px] md:border-[3px] border-gray-500/60 rounded-lg pointer-events-none z-10"></div>
                    <div class="absolute inset-0 opacity-20 rounded-lg pointer-events-none" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 4px 4px;"></div>
                    <div class="absolute -top-1 -left-1 w-2 h-2 md:w-3 md:h-3 bg-gradient-to-br from-gray-200 to-gray-600 rounded-full shadow-md border border-gray-800 z-20"></div>
                    <div class="absolute -top-1 -right-1 w-2 h-2 md:w-3 md:h-3 bg-gradient-to-bl from-gray-200 to-gray-600 rounded-full shadow-md border border-gray-800 z-20"></div>
                    <div class="absolute -bottom-1 -left-1 w-2 h-2 md:w-3 md:h-3 bg-gradient-to-tr from-gray-200 to-gray-600 rounded-full shadow-md border border-gray-800 z-20"></div>
                    <div class="absolute -bottom-1 -right-1 w-2 h-2 md:w-3 md:h-3 bg-gradient-to-tl from-gray-200 to-gray-600 rounded-full shadow-md border border-gray-800 z-20"></div>
                    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-4 md:w-6 h-1 md:h-1.5 bg-gray-400 border border-gray-600 rounded-t-sm z-20"></div>
                ` : '';

                html += `
                    <div id="box-card-${box.id}" onclick="navigateTo('${box.id}')" class="aspect-square border-b-4 md:border-b-8 border-r-4 md:border-r-8 rounded-lg p-2 md:p-3 flex flex-col items-center justify-center transition-transform active:scale-95 relative group cursor-pointer ${boxBgClass}">
                        ${caseAccents}
                        <i data-lucide="${customIcon}" class="w-8 h-8 md:w-10 md:h-10 ${boxIconColor} mb-1 md:mb-2 md:group-hover:${isItemCase ? 'text-white' : 'text-[#6a4821]'} md:group-hover:scale-110 transition-all z-20 drop-shadow-lg mt-1"></i>
                        <span class="font-bold ${boxTextClass} text-center text-[9px] md:text-[10px] leading-tight px-1 line-clamp-2 w-full z-20 drop-shadow-md">${box.name}</span>
                        <div class="flex items-center justify-between w-full mt-1 md:mt-2 px-1 z-20">
                            <span class="text-[8px] md:text-[10px] font-black ${boxTextClass} font-mono truncate mr-1 drop-shadow-md">${boxDisplayName}</span>
                            <span class="text-[8px] md:text-[9px] ${qtyBgClass} ${boxTextClass} px-1 rounded font-bold whitespace-nowrap drop-shadow-md">Qty: ${box.totalQty}</span>
                        </div>
                        <div class="absolute bottom-2 md:bottom-3 left-1/2 -translate-x-1/2 w-[70%] h-1.5 md:h-3 flex justify-center gap-[1px] md:gap-[2px] opacity-${isItemCase ? '30' : '40'} z-20">${barcodeHtml}</div>
                        ${isHighlighted ? `<div class="absolute -top-2 -right-2 flex h-5 w-5 md:h-6 md:w-6 z-30"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-${highlightColor}-400 opacity-75"></span><span class="relative inline-flex rounded-full h-full w-full bg-${highlightColor}-500 text-white items-center justify-center"><i data-lucide="map-pin" class="w-3 h-3"></i></span></div>` : ''}
                    </div>
                `;
            });

            // Add Box Button
            html += `
                <div onclick="showAddBoxModal('${node.id}')" class="aspect-square border-2 border-dashed border-gray-600 bg-gray-800/30 rounded-lg p-2 md:p-3 flex flex-col items-center justify-center transition-transform active:scale-95 cursor-pointer opacity-60 hover:opacity-100 hover:border-blue-500 hover:bg-gray-800 group shadow-sm">
                    <i data-lucide="plus" class="w-8 h-8 md:w-10 md:h-10 text-gray-500 group-hover:text-blue-400 mb-1 transition-colors"></i>
                    <span class="font-bold text-gray-500 group-hover:text-blue-300 text-center text-[9px] md:text-[10px] leading-tight uppercase tracking-wider transition-colors">Add Box</span>
                </div>
            `;

            html += `</div></div>`;
            return html;
        };

        const renderBoxView = (node) => {
            const hasEdits = Object.keys(pendingEdits).length > 0;
            
            let mobileCardsHtml = '';
            let desktopRowsHtml = '';

            let counter = 1;
            node.items.forEach(item => {
                const currentCode = pendingEdits[item.uniqueId] !== undefined ? pendingEdits[item.uniqueId].code : (item.code || '');
                const currentStatus = pendingEdits[item.uniqueId] !== undefined ? pendingEdits[item.uniqueId].status : (item.status || 'Ready for Shipping');
                
                const s = currentStatus.toLowerCase();
                const statuses = ['Ready for Shipping', 'Freshly Bought', 'Not Checked', 'Needs Repair', 'Sent for Repair', 'Shipped'];
                let statusOptions = statuses.map(opt => `<option value="${opt}" ${s === opt.toLowerCase() || (opt==='Shipped' && s.includes('out')) ? 'selected' : ''}>${opt}</option>`).join('');

                let mobileStatusBadge = '';
                if (s.includes('repair')) mobileStatusBadge = '<span class="text-red-400 bg-red-400/10 px-2 py-0.5 rounded text-[10px] font-bold uppercase flex items-center gap-1"><i data-lucide="tool" class="w-3 h-3"></i> Repair</span>';
                else if (s.includes('main')) mobileStatusBadge = '<span class="text-amber-400 bg-amber-400/10 px-2 py-0.5 rounded text-[10px] font-bold uppercase flex items-center gap-1"><i data-lucide="settings" class="w-3 h-3"></i> Maint.</span>';
                else if (s.includes('ship') || s.includes('out')) mobileStatusBadge = '<span class="text-purple-400 bg-purple-400/10 px-2 py-0.5 rounded text-[10px] font-bold uppercase flex items-center gap-1"><i data-lucide="truck" class="w-3 h-3"></i> Shipped</span>';
                else mobileStatusBadge = '<span class="text-green-400 bg-green-400/10 px-2 py-0.5 rounded text-[10px] font-bold uppercase flex items-center gap-1"><i data-lucide="check-circle" class="w-3 h-3"></i> Ready</span>';

                mobileCardsHtml += `
                    <div class="bg-[#161b22] border border-gray-800 rounded-xl p-4 mb-4 shadow-sm md:hidden">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-2 pr-2">
                                <span class="text-gray-500 font-mono text-[10px] bg-gray-800 px-1.5 py-0.5 rounded">${counter}</span>
                                <h3 class="font-bold text-gray-200 text-sm line-clamp-2">${item.name}</h3>
                            </div>
                            <div class="shrink-0">${mobileStatusBadge}</div>
                        </div>
                        
                        ${item.desc ? `<p class="text-[10px] text-gray-500 mb-2 leading-tight">${item.desc}</p>` : ''}
                        ${item.notes ? `<p class="text-[10px] text-blue-400/80 italic mb-3 leading-tight"><i data-lucide="message-square" class="w-3 h-3 inline mr-1"></i>${item.notes}</p>` : ''}
                        
                        <div class="flex flex-col gap-2 bg-[#0a0d14] p-3 rounded-lg border border-gray-800/50">
                            <div>
                                <label class="text-[9px] text-gray-500 uppercase font-bold mb-1 block">Item Code</label>
                                <input type="text" value="${currentCode}" placeholder="Enter code..." onchange="handleEdit('${item.uniqueId}', 'code', this.value)" class="w-full bg-transparent border-b border-gray-700 focus:border-blue-500 py-1 text-xs font-mono text-blue-300 outline-none transition-colors placeholder-gray-600">
                            </div>
                            <div class="mt-1">
                                <label class="text-[9px] text-gray-500 uppercase font-bold mb-1 block">Status</label>
                                <select onchange="handleEdit('${item.uniqueId}', 'status', this.value)" class="w-full bg-transparent border-b border-gray-700 focus:border-blue-500 py-1 text-xs text-gray-300 outline-none transition-colors appearance-none">
                                    ${statusOptions}
                                </select>
                            </div>
                        </div>
                    </div>
                `;

                let desktopStatusBadge = '';
                if (s.includes('repair')) desktopStatusBadge = '<span class="text-red-400 bg-red-400/10 border border-red-500/30 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wide flex items-center w-fit gap-1.5"><i data-lucide="tool" class="w-3 h-3"></i> Repair</span>';
                else if (s.includes('main')) desktopStatusBadge = '<span class="text-amber-400 bg-amber-400/10 border border-amber-500/30 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wide flex items-center w-fit gap-1.5"><i data-lucide="settings" class="w-3 h-3"></i> Maint.</span>';
                else if (s.includes('ship') || s.includes('out') || s.includes('check')) desktopStatusBadge = '<span class="text-purple-400 bg-purple-400/10 border border-purple-500/30 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wide flex items-center w-fit gap-1.5"><i data-lucide="truck" class="w-3 h-3"></i> Shipped</span>';
                else desktopStatusBadge = '<span class="text-green-400 bg-green-400/10 border border-green-500/30 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wide flex items-center w-fit gap-1.5"><i data-lucide="check-circle" class="w-3 h-3"></i> Ready</span>';

                desktopRowsHtml += `
                    <tr class="hover:bg-gray-800/80 transition-colors group hidden md:table-row">
                        <td class="p-4 text-center text-sm font-mono text-gray-600 group-hover:text-gray-400 border-r border-gray-800/50">${counter}</td>
                        <td class="p-4 text-sm font-bold text-gray-300 group-hover:text-white transition-colors">
                            <div class="flex items-start gap-3">
                                <i data-lucide="${getIconForItemName(item.name)}" class="w-4 h-4 text-gray-500 group-hover:text-blue-400 transition-colors mt-0.5 shrink-0"></i>
                                <div>
                                    ${item.name}
                                    ${item.desc ? `<div class="text-[10px] text-gray-500 mt-1 whitespace-normal line-clamp-2">${item.desc}</div>` : ''}
                                    ${item.notes ? `<div class="text-[10px] text-blue-400/80 italic mt-1 whitespace-normal line-clamp-2"><i data-lucide="message-square" class="w-2 h-2 inline"></i> ${item.notes}</div>` : ''}
                                </div>
                            </div>
                        </td>
                        <td class="p-4 border-l border-gray-800/50">
                            <input type="text" value="${currentCode}" placeholder="Code..." onchange="handleEdit('${item.uniqueId}', 'code', this.value)" class="w-full bg-[#0a0d14] border border-gray-700 focus:border-blue-500 rounded p-1.5 text-xs font-mono text-blue-300 outline-none transition-colors shadow-inner placeholder-gray-600">
                        </td>
                        <td class="p-4 border-l border-gray-800/50">
                            <div class="flex flex-col gap-2">
                                ${desktopStatusBadge}
                                <select onchange="handleEdit('${item.uniqueId}', 'status', this.value)" class="w-full bg-[#0a0d14] border border-gray-700 focus:border-blue-500 rounded p-1 text-[10px] text-gray-400 outline-none cursor-pointer transition-colors shadow-inner appearance-none mt-1">
                                    ${statusOptions}
                                </select>
                            </div>
                        </td>
                    </tr>
                `;
                counter++;
            });

            let html = `
                <div class="w-full bg-[#1e232d] md:rounded-xl border-y md:border border-gray-700 md:shadow-2xl overflow-hidden flex flex-col h-auto min-h-[500px] md:h-[600px] -mx-4 md:mx-0 w-[calc(100%+2rem)] md:w-full">
                    <div class="bg-gradient-to-r from-gray-800 to-gray-900 border-b border-gray-700 p-4 md:p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shrink-0">
                        <div class="flex items-center gap-3 md:gap-4 w-full md:w-auto">
                            <div class="w-10 h-10 md:w-12 md:h-12 bg-blue-500/20 border border-blue-500/50 rounded-lg flex items-center justify-center shadow-inner shrink-0">
                                <i data-lucide="${getIconForItemName(node.name)}" class="w-5 h-5 md:w-6 md:h-6 text-blue-400"></i>
                            </div>
                            <div class="flex-1 overflow-hidden">
                                <h2 class="text-base md:text-2xl font-black text-white tracking-wide uppercase leading-tight truncate">${node.name}</h2>
                                <p class="text-[9px] md:text-sm text-gray-400 font-mono mt-1 truncate">${node.location}</p>
                            </div>
                            
                            <div class="bg-black/40 border border-gray-600 px-3 py-1.5 rounded-lg text-center shadow-inner shrink-0 md:hidden">
                                <span class="block text-sm font-black text-blue-400">${node.totalQty}</span>
                                <span class="text-[7px] text-gray-500 uppercase font-bold">Units</span>
                            </div>
                        </div>

                        <div class="flex items-center justify-between w-full md:w-auto gap-3">
                            <button id="saveEditsBtnMobile" onclick="submitEdits()" class="${hasEdits ? '' : 'hidden'} md:hidden bg-green-600 active:bg-green-500 text-white text-xs font-bold py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 w-full shadow-lg">
                                <i data-lucide="save" class="w-4 h-4"></i> Save Edits
                            </button>
                            <button id="saveEditsBtnDesktop" onclick="submitEdits()" class="${hasEdits ? '' : 'hidden'} hidden md:flex bg-green-600 hover:bg-green-500 text-white text-xs font-bold px-4 py-2.5 rounded-lg items-center justify-center gap-2 shadow-[0_0_10px_rgba(22,163,74,0.4)] transition-all">
                                <i data-lucide="save" class="w-4 h-4"></i> Save Changes
                            </button>
                            
                            <div class="bg-black/40 border border-gray-600 px-4 py-2 rounded-lg text-center shadow-inner shrink-0 hidden md:block">
                                <span class="block text-xl font-black text-blue-400">${node.totalQty}</span>
                                <span class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Total Units</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex-1 overflow-y-auto overflow-x-hidden md:overflow-x-auto custom-scrollbar bg-[#121620] p-4 md:p-0">
                        ${mobileCardsHtml}
                        
                        <table class="w-full text-left border-collapse min-w-[700px] hidden md:table">
                            <thead class="bg-[#1a202c] sticky top-0 z-10 shadow-md">
                                <tr>
                                    <th class="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider w-12 text-center border-b border-gray-700">#</th>
                                    <th class="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider border-b border-gray-700">Item Details</th>
                                    <th class="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider w-44 border-b border-gray-700">Item Code</th>
                                    <th class="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider w-40 border-b border-gray-700">Status</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-800/60">
                                ${desktopRowsHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            return html;
        };

        const renderApp = () => {
            const currentView = path[path.length - 1];
            
            let infoText = 'Warehouse Layout';
            if (currentView.type === 'rack') infoText = 'Select a Section';
            else if (currentView.type === 'section') infoText = 'Select a Case/Palette';
            else if (currentView.type === 'palette' || currentView.type === 'flight-case') infoText = `Inside ${currentView.type.replace('-', ' ')}`;
            else if (currentView.type === 'box') infoText = 'Item Details';

            let viewHtml = '';
            if (currentView.type === 'warehouse') viewHtml = renderWarehouse(currentView);
            if (currentView.type === 'rack') viewHtml = renderRack(currentView);
            if (currentView.type === 'section') viewHtml = renderSection(currentView);
            if (currentView.type === 'palette' || currentView.type === 'flight-case') viewHtml = renderContainer(currentView);
            if (currentView.type === 'box') viewHtml = renderBoxView(currentView);

            document.getElementById('app').innerHTML = `
                <header class="bg-[#1a1a1a] border-b border-gray-800 px-4 sm:px-6 py-3 sm:py-4 flex flex-col md:flex-row md:items-center justify-between sticky top-0 z-50 shadow-md gap-3 md:gap-0">
                    <div class="flex items-center justify-between w-full md:w-auto">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="goHome()">
                            <div class="bg-blue-600 p-1.5 sm:p-2 rounded-lg shadow-lg shadow-blue-900/20"><i data-lucide="map" class="w-5 h-5 sm:w-5 sm:h-5 text-white"></i></div>
                            <div>
                                <h1 class="text-base sm:text-xl font-bold tracking-wide text-white leading-tight">LBD Inventory</h1>
                                <p class="text-[9px] sm:text-xs text-blue-400 font-mono flex items-center gap-1"><span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-green-500 animate-pulse"></span> Live API Sync</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3 w-full md:w-auto">
                        <div class="relative w-full md:w-auto z-50">
                            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                            <input id="searchInput" type="text" oninput="handleSearch(this)" placeholder="Search inventory..." class="bg-gray-800 border border-gray-700 text-sm rounded-full pl-9 pr-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 w-full md:w-64 transition-all text-[#e0e0e0] shadow-inner" autocomplete="off"/>
                            <div id="searchResultsDropdown" class="absolute top-full mt-2 w-full bg-gray-800 border border-gray-700 rounded-lg shadow-2xl hidden max-h-[50vh] overflow-y-auto custom-scrollbar"></div>
                        </div>

                        <div class="hidden md:flex items-center gap-3">
                            <button onclick="forceSync()" class="bg-gray-800 hover:bg-gray-700 border border-gray-600 text-gray-300 text-xs font-bold py-2 px-4 rounded-full flex items-center gap-2 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <i data-lucide="refresh-cw" class="w-3.5 h-3.5 text-blue-400"></i> Sync
                            </button>
                        </div>
                    </div>
                </header>

                <main class="max-w-7xl mx-auto p-4 md:p-8 w-full">
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 sm:mb-6 gap-3">
                        <div class="flex items-center bg-gray-900 rounded-lg p-1 border border-gray-800 overflow-x-auto custom-scrollbar shadow-sm w-full md:w-auto">
                            ${path.length > 1 ? `<button onclick="goUp()" class="p-1.5 sm:p-2 text-gray-400 active:text-white md:hover:text-white md:hover:bg-gray-800 rounded-md transition-colors mr-1 sm:mr-2 flex-shrink-0" title="Go Up"><i data-lucide="arrow-left" class="w-4 h-4"></i></button>` : ''}
                            
                            <div class="flex items-center px-1 sm:px-2 whitespace-nowrap">
                                ${path.map((node, index) => `
                                    ${index > 0 ? '<span class="mx-1 sm:mx-2 text-gray-600">/</span>' : ''}
                                    <button onclick="navigateBack(${index})" class="text-[10px] sm:text-sm font-medium px-2 py-1.5 rounded-md transition-colors flex items-center gap-1.5 ${index === path.length - 1 ? 'text-blue-400 bg-blue-400/10 cursor-default border border-blue-500/20' : 'text-gray-400 active:text-white md:hover:text-white md:hover:bg-gray-800'}">
                                        ${index === 0 ? `<i data-lucide="home" class="w-3 h-3 sm:w-3.5 sm:h-3.5"></i>` : ''} <span class="truncate max-w-[80px] sm:max-w-none">${node.name}</span>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <div class="flex items-center text-xs sm:text-sm text-gray-400 bg-gray-900/50 px-3 sm:px-4 py-2 rounded-lg border border-gray-800/50 shadow-sm w-max self-start md:self-auto hidden md:flex">
                            <i data-lucide="info" class="w-3 h-3 sm:w-4 sm:h-4 mr-2 text-blue-500"></i> <span>${infoText}</span>
                        </div>
                    </div>
                    <div class="animate-in-view">${viewHtml}</div>
                    <div class="mobile-nav-spacer md:hidden"></div>
                </main>
            `;
            lucide.createIcons();
        };

        document.addEventListener('click', (e) => {
            const searchDropdown = document.getElementById('searchResultsDropdown');
            const searchInput = document.getElementById('searchInput');
            if (searchDropdown && searchInput && !searchInput.contains(e.target) && !searchDropdown.contains(e.target)) {
                searchDropdown.classList.add('hidden');
            }
        });

    </script>
</body>
</html>
